# ---------------------------------------------------------------------------
# API CI/CD: lint, test, build, push, deploy
# Project: Surf -- Multi-Agent Orchestration Platform
# ---------------------------------------------------------------------------

name: API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: api
  WORKING_DIR: api
  IMAGE_NAME: surf-api

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --prerelease=allow

      - name: Ruff check
        run: uv run ruff check .

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --prerelease=allow

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ---------------------------------------------------------------------------
  # Build & Push Docker image to ACR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: dev
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image-tag }}" \
            -f ${{ env.WORKING_DIR }}/Dockerfile \
            ${{ env.WORKING_DIR }}
          docker push "${{ steps.meta.outputs.image-tag }}"

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image-tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image-tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}-${{ github.sha }}
          path: sbom.spdx.json

  # ---------------------------------------------------------------------------
  # Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: dev
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ca-${{ env.SERVICE_NAME }}-surf-dev
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-push.outputs.image-tag }}
