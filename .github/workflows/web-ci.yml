# ---------------------------------------------------------------------------
# Web CI/CD: lint, typecheck, build, deploy to Azure Static Web Apps
# Project: Surf -- Multi-Agent Orchestration Platform
# ---------------------------------------------------------------------------

name: Web CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Typecheck
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Build & Deploy
  # ---------------------------------------------------------------------------
  build-deploy:
    name: Build & Deploy
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SURF_API_URL: ${{ vars.VITE_SURF_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web
          output_location: dist
          skip_app_build: true
