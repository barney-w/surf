# ---------------------------------------------------------------------------
# Web CI/CD: lint, typecheck, build Docker image, deploy to Container Apps
# Project: Surf -- Multi-Agent Orchestration Platform
# ---------------------------------------------------------------------------

name: Web CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: web
  IMAGE_NAME: surf-web

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Typecheck
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout surf-kit (shared UI packages)
        run: git clone --depth 1 https://github.com/${{ vars.SURF_KIT_REPO || 'anthropics/surf-kit' }}.git ../../surf-kit

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build surf-kit packages
        run: |
          cd ../../surf-kit
          corepack enable pnpm
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Build & Push Docker image to ACR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: dev
    defaults:
      run:
        working-directory: web
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout surf-kit (shared UI packages)
        run: git clone --depth 1 https://github.com/${{ vars.SURF_KIT_REPO || 'anthropics/surf-kit' }}.git ../../surf-kit

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build surf-kit packages
        run: |
          cd ../../surf-kit
          corepack enable pnpm
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build
        env:
          VITE_ENTRA_CLIENT_ID: ${{ vars.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ vars.VITE_ENTRA_TENANT_ID }}

      - name: Mask sensitive identifiers
        run: |
          echo "::add-mask::${{ vars.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ vars.AZURE_TENANT_ID }}"

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image-tag }}" \
            -f Dockerfile \
            .
          docker push "${{ steps.meta.outputs.image-tag }}"

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.image-tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          image: ${{ steps.meta.outputs.image-tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}-${{ github.sha }}
          path: sbom.spdx.json

  # ---------------------------------------------------------------------------
  # Deploy to Azure Container Apps
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: dev
    steps:
      - name: Mask sensitive identifiers
        run: |
          echo "::add-mask::${{ vars.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ vars.AZURE_TENANT_ID }}"

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@29ee19866ec987ededd70b8412d9ee241a9102d1 # v1
        with:
          containerAppName: ca-${{ env.SERVICE_NAME }}-surf-dev
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-push.outputs.image-tag }}

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show \
            --name ca-${{ env.SERVICE_NAME }}-surf-dev \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/healthz")
            if [ "$status" = "200" ]; then
              echo "Web is healthy"
              exit 0
            fi
            echo "Attempt $i: status=$status, retrying..."
            sleep 5
          done
          echo "ERROR: Health check failed after 150 seconds"
          exit 1
