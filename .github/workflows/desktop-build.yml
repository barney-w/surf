name: Build Desktop App (Windows)

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

env:
  VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
  VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
  VITE_DESKTOP_API_URL: ${{ secrets.DESKTOP_API_URL }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.repository_owner }}/surf-kit
          path: surf-kit
          token: ${{ secrets.SURF_KIT_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@de6aa2c038f5160743bf2589a4db84415dc59a25 # v2
        with:
          workspaces: web/src-tauri

      - name: Install signing tools
        run: cargo install trusted-signing-cli

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build Tauri app
        working-directory: web
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATE_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Upload installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: surf-windows-installer
          path: |
            web/src-tauri/target/release/bundle/nsis/*.exe
            web/src-tauri/target/release/bundle/nsis/*.sig
