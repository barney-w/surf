# ---------------------------------------------------------------------------
# Infrastructure Deployment: Bicep via az deployment group create
# Project: Surf -- Multi-Agent Orchestration Platform
# ---------------------------------------------------------------------------

name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra-deploy.yml"
  workflow_dispatch:

concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel in-flight infra deployments

permissions:
  id-token: write   # OIDC token for Azure auth
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Validate Bicep template
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mask sensitive identifiers
        run: |
          echo "::add-mask::${{ vars.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ vars.AZURE_TENANT_ID }}"

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep deployment
        run: |
          az deployment group validate \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/environments/dev.bicepparam \
            --parameters entraTenantId="${{ vars.ENTRA_TENANT_ID }}" \
            --parameters entraClientId="${{ vars.ENTRA_CLIENT_ID }}" \
            --parameters organisationName="${{ vars.ORGANISATION_NAME }}" \
            --parameters aiSearchEndpointOverride="${{ vars.AI_SEARCH_ENDPOINT_OVERRIDE }}"

  # ---------------------------------------------------------------------------
  # Deploy infrastructure
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mask sensitive identifiers
        run: |
          echo "::add-mask::${{ vars.AZURE_SUBSCRIPTION_ID }}"
          echo "::add-mask::${{ vars.AZURE_TENANT_ID }}"

      - name: Azure login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/environments/dev.bicepparam \
            --parameters entraTenantId="${{ vars.ENTRA_TENANT_ID }}" \
            --parameters entraClientId="${{ vars.ENTRA_CLIENT_ID }}" \
            --parameters organisationName="${{ vars.ORGANISATION_NAME }}" \
            --parameters aiSearchEndpointOverride="${{ vars.AI_SEARCH_ENDPOINT_OVERRIDE }}" \
            --name "surf-dev-$(date +%Y%m%d%H%M%S)"
