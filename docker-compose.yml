services:
  postgres:
    container_name: surf-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: surf
      POSTGRES_USER: surf
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surf -d surf"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
