# ---------------------------------------------------------------------------
# Ingestion CI/CD: lint → test → build/push/scan → deploy
# ---------------------------------------------------------------------------
# Mirrors: .github/workflows/ingestion-ci.yml
# Trigger: push to main changing ingestion/**, or manual
# Auth: Workload Identity Federation via .azure-docker-build / .azure-deploy
# ---------------------------------------------------------------------------

.ingestion-ci-rules:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [ingestion/**, .gitlab/ci/ingestion-ci.yml]
    - if: '$CI_PIPELINE_SOURCE == "web"'

ingestion-lint:
  extends: .ingestion-ci-rules
  stage: lint
  image: python:3.12-slim
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/0.7.2/install.sh -o /tmp/uv-install.sh
    - echo "dc5cab9ace3988b5b37d7780ba27ac259b4194d5f6435ea8fcfd81e2962a01f6  /tmp/uv-install.sh" | sha256sum -c -
    - sh /tmp/uv-install.sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd ingestion
    - uv sync --frozen --prerelease=allow
    - uv run ruff check .

ingestion-test:
  extends: .ingestion-ci-rules
  stage: test
  image: python:3.12-slim
  needs: [ingestion-lint]
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/0.7.2/install.sh -o /tmp/uv-install.sh
    - echo "dc5cab9ace3988b5b37d7780ba27ac259b4194d5f6435ea8fcfd81e2962a01f6  /tmp/uv-install.sh" | sha256sum -c -
    - sh /tmp/uv-install.sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd ingestion
    - uv sync --frozen --prerelease=allow
    - uv run pytest --tb=short -q

ingestion-build-push:
  extends: [.ingestion-ci-rules, .azure-docker-build]
  stage: build
  needs: [ingestion-test]
  environment:
    name: dev
  script:
    - SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
    - INGESTION_IMAGE_TAG="${ACR_LOGIN_SERVER}/surf-ingestion:${SHORT_SHA}"
    - docker build -t "$INGESTION_IMAGE_TAG" -f ingestion/Dockerfile ingestion
    - docker push "$INGESTION_IMAGE_TAG"
    - echo "INGESTION_IMAGE_TAG=${INGESTION_IMAGE_TAG}" >> "$CI_PROJECT_DIR/ingestion-build.env"

    # Trivy vulnerability scan (checksum-verified)
    - curl -sfL --retry 3 --retry-delay 5 -o /tmp/trivy.tar.gz https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
    - echo "1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75  /tmp/trivy.tar.gz" | sha256sum -c -
    - tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
    - trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed "$INGESTION_IMAGE_TAG"

    # SBOM generation (checksum-verified)
    - curl -sfL --retry 3 --retry-delay 5 -o /tmp/syft.tar.gz https://github.com/anchore/syft/releases/download/v1.22.0/syft_1.22.0_linux_amd64.tar.gz
    - echo "90ac44b173bd5db36142b351c2e83f89ecdee403285513d4586303dbf8b6bea1  /tmp/syft.tar.gz" | sha256sum -c -
    - tar -xzf /tmp/syft.tar.gz -C /usr/local/bin syft
    - syft "$INGESTION_IMAGE_TAG" -o spdx-json > "$CI_PROJECT_DIR/sbom-ingestion.spdx.json"
  artifacts:
    reports:
      dotenv: ingestion-build.env
    paths:
      - sbom-ingestion.spdx.json
    expire_in: 30 days

ingestion-deploy:
  extends: [.ingestion-ci-rules, .azure-deploy]
  stage: deploy
  needs: [ingestion-build-push]
  interruptible: false
  resource_group: ingestion-deploy
  environment:
    name: dev
  script:
    - az containerapp update
        --name ca-ingestion-surf-dev
        --resource-group "$AZURE_RESOURCE_GROUP"
        --image "$INGESTION_IMAGE_TAG"

    # Verify latest revision is running (ingestion has no ingress, check via API)
    - |
      for i in $(seq 1 20); do
        STATUS=$(az containerapp revision list \
          --name ca-ingestion-surf-dev \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --query "[0].properties.runningState" -o tsv)
        case "$STATUS" in
          Running|RunningAtMaxScale)
            echo "Ingestion revision is healthy (status: $STATUS)"
            exit 0 ;;
          Failed|Degraded)
            echo "ERROR: Revision failed (status: $STATUS)"
            exit 1 ;;
        esac
        echo "Attempt $i: revision status=$STATUS, waiting..."
        sleep 5
      done
      echo "ERROR: Revision not running after 100 seconds (last status: $STATUS)"
      exit 1
