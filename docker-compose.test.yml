services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: surf
      POSTGRES_PASSWORD: test
      POSTGRES_DB: surf_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surf -d surf_test"]
      interval: 2s
      timeout: 2s
      retries: 10
